<script>
    $(document).ready(function () {
        // 상세페이지 신규 아이콘 추가 코드
        addIcon();
        // 온라인 단독 아이콘
        addOnlineIcon();

        // 컬러명
        // addColor();

        // 추천 상품 슬라이드
        relationSlide();

        // [1] 초기화 함수: 로드 시점에 모바일이면 강제로 닫음
        function initAccordion() {
            if ($(window).width() <= 1366) {
                $('.simple-desc-wrap').removeClass('active');
                $('.simple-desc-wrap p').hide(); // 인라인 스타일로 확실히 숨김
            } else {
                $('.simple-desc-wrap p').show();
            }
        }

        // 페이지 로드 시 실행
        initAccordion();

        // [2] 아코디언 클릭 이벤트
        $('.simple-desc-wrap h6').off('click').on('click', function () {
            if ($(window).width() <= 1366) {
                var $wrap = $(this).closest('.simple-desc-wrap');
                var $content = $(this).next('p');

                // 화살표 회전을 위한 클래스 토글
                $wrap.toggleClass('active');

                // h6 위치는 고정하고 아래 p태그만 슬라이드
                $content.stop().slideToggle(300, function () {
                    // 카페24 스킨의 높이 재계산 버그 방지
                    window.dispatchEvent(new Event('resize'));
                });
            }
        });

        // [3] 화면 크기 변경 시 대응
        $(window).on('resize', function () {
            if ($(window).width() > 1366) {
                $('.simple-desc-wrap p').css('display', 'block');
                $('.simple-desc-wrap').removeClass('active');
            } else {
                // PC에서 모바일로 줄어들 때, active가 없는 상태라면 다시 숨김
                if (!$('.simple-desc-wrap').hasClass('active')) {
                    $('.simple-desc-wrap p').css('display', 'none');
                }
            }
        });
    });
    function relationSlide() {
        var relationSlide = new Swiper(".relationSwiper", {
            slidesPerView: 2.5,
            spaceBetween: 10,
            loop: false,
            // loop: false,
            navigation: {
                nextEl: ".relation-button-next",
                prevEl: ".relation-button-prev",
            },
            breakpoints: {
                768: {
                    slidesPerView: 4.5,
                    spaceBetween: 10,
                },
            },
        });
    }

    // 상세페이지 신규 아이콘 추가 코드

function addIcon() {
    let iconSelect = $('[data-title="상품요약정보"]').find('.desc').find('span').html();

    if (iconSelect && iconSelect !== 'undefined') {
        $('.icon.og_promotion_icons').append(iconSelect);
    }
}

function addOnlineIcon() {
    var $el = $(".prdDetail_infoBox .og_promotion_icons");
    var promotionIconsContent = ($el.html() || "").trim();

    if (!promotionIconsContent) return;

    // 온라인단독
    var onlineRegex = /온라인\s*단독|온라인단독/;
    if (onlineRegex.test(promotionIconsContent)) {
        $el.addClass('online');
    }

    // 자사몰단독
    var onlyRegex = /자사몰\s*단독|자사몰단독/;
    if (onlyRegex.test(promotionIconsContent)) {
        $el.addClass('only');
    }
}


    function addColor() {
        // data-title="컬러"를 가진 요소를 찾고, 해당 요소의 .desc 안의 span 값을 가져옴
        var colorValue = $('.og_basic_prd_info .prdDetail_info[data-title="컬러"] .desc span').text();
        // console.log("컬러명: ", colorValue);
        // 가져온 값을 .productSet.additional 안에 span 요소로 추가
        $('.xans-product-detail .productSet.additional').prepend('<span class="colorName">' + colorValue + '</span>');
    }
</script>

<script>
    // 모바일에서 이미지 로드가 안되어 아래 스크립트 추가함

    document.addEventListener("DOMContentLoaded", function() {
        const detailContainer = document.querySelector('#prdDetail');
        if (!detailContainer) return;

        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.attributeName === 'src') {
                    const img = mutation.target;
                    const realSrc = img.getAttribute('ec-data-src'); // 카페24 실제 이미지 경로 속성

                    // 만약 src가 다시 투명 이미지(base64)로 바뀌려고 한다면 원복
                    if (img.src.includes('data:image/png;base64') && realSrc) {
                        img.src = realSrc;
                    }
                }
            });
        });

        // 상세정보 내 모든 이미지 감시 시작
        const images = detailContainer.querySelectorAll('img');
        images.forEach(img => {
            observer.observe(img, { attributes: true });
        });
    });
</script>

<script>
$(document).ready(function () {
    const $totalDisplay = $('.og_totalPrice .total');

    function formatPrice(num){
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function calculateTotal() {

        let grandTotal = 0;
        let totalQty = 0;

        $('#totalProducts .option_products tr.option_product').each(function () {

            const $row = $(this);

            // 가격
            let priceText = $row.find('.og_product_price').text();
            if (!priceText) {
                priceText = $row.find('.right span').first().text();
            }

            let price = parseInt(priceText.replace(/[^0-9]/g, '')) || 0;

            // 수량
            let qty = parseInt($row.find('input.quantity_opt').val()) || 0;

            if (price > 0 && qty > 0) {
                grandTotal += price * qty;
                totalQty += qty;
            }

        });

        if (totalQty === 0) {
            $totalDisplay.html('<strong><em>0원</em></strong> (0개)');
            return;
        }

        const html =
            '<strong><em>' +
            formatPrice(grandTotal) +
            '원</em></strong> (' +
            totalQty +
            '개)';

        $totalDisplay.html(html);
    }

    // ----------------------------
    // 이벤트
    // ----------------------------

    // 수량 증가 감소
    $(document).on(
        'click',
        '.up, .down, .QuantityUp, .QuantityDown, .eProductQuantityUpClass, .eProductQuantityDownClass',
        function () {
            setTimeout(calculateTotal, 200);
        }
    );

    // 옵션 삭제
    $(document).on('click', '.option_box_del, .delete', function () {
        setTimeout(calculateTotal, 100);
    });

    // 수량 직접 입력
    $(document).on(
        'input change keyup',
        'input.quantity_opt',
        function () {
            setTimeout(calculateTotal, 150);
        }
    );

    // 옵션 추가 감지 (카페24 옵션 추가)
    const target = document.querySelector('#totalProducts');

    if (target) {
        const observer = new MutationObserver(function () {
            setTimeout(calculateTotal, 100);
        });

        observer.observe(target, {
            childList: true,
            subtree: true
        });
    }

    // 최초 실행
    setTimeout(calculateTotal, 300);

});
</script>

<script>
    (function(){
        const start = new Date('2026/03/01');
        const end   = new Date('2026/05/31 23:59:59');
        const now = new Date();
        const text = (now >= start && now <= end)
        ? "5만원 이상 결제하면 토스페이 추가 할인"
        : "회원가입 혜택이 있어요.";
        function insertMsg(){
            if(document.querySelector('.toss-free-ship-msg')) return;
            const target = document.querySelector('.ec-base-help');
            if(!target) return;
            const msg = document.createElement('div');
            msg.className = 'toss-free-ship-msg';
            msg.textContent = text;
            Object.assign(msg.style,{
                marginTop:'6px',
                fontSize:'13px',
                fontWeight:'600',
                color:'#0b63d6'
            });
            target.insertAdjacentElement('afterend', msg);
        }
        if(document.readyState === 'loading'){
            document.addEventListener('DOMContentLoaded', insertMsg);
        } else {
            insertMsg();
        }
    })();
</script>
