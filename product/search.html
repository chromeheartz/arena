<div class="og_sub_container" data-page="prdSearch">
    <div class="section path">
        <span>현재 위치</span>
        <ol>
            <li><a href="/">홈</a></li>
            <li title="현재 위치"><strong>상품검색</strong></li>
        </ol>
    </div>

    <div class="section titleArea">
        <h2>상품 검색</h2>
    </div>

    <div class="normalpackage_box">
        <!--@import(/product/shoppQ/searchForm_typeTop.html)-->
        <div class="">
            <div class="og_inner">
                <!--
                    $compare_page = /product/compare.html
                -->
                <div class="og_function_area" module="product_searchdata" >
                    <div class="og_function_box">
                        <div class="function" id="Product_ListMenu">
                            <p class="prdCount">상품 검색 결과 <strong class="txtEm">{$total_count}</strong></p>
                            <div class="sort">
                                <div module="product_searchdata">
                                    <div class="searchOrder">{$searchOrderby}</div>
                                </div>
                            </div>
                        </div>
                        <div class="og_curation_button">
                            <span>필터</span>
                            <!--@import(/SkinImg/svg/filter.html)-->
                        </div>
                    </div>
                </div>
            </div> 
            <!-- 상세검색 팝업형 -->
            <!--@import(/product/shoppQ/searchData_typePopup.html)-->
            <div class="og_inner">
                <div module="Search_Result" class="section ec-base-product og_base_product">
                    <!--
                        $count = 20
                    -->
                    <ul class="prdList grid4">
                        <li id="anchorBoxId_{$product_no}" data-prd="{$product_no}" class="each_product">
                            <!--@import(/ogam/html/prd/common_prd.html)-->
                            <!--@import(/ogam/html/prd/search_ListItem.html)-->
                        </li>
                        <li id="anchorBoxId_{$product_no}" data-prd="{$product_no}" class="each_product">
                            <!--@import(/ogam/html/prd/common_prd.html)-->
                            <!--@import(/ogam/html/prd/search_ListItem.html)-->
                        </li>
                    </ul>
                </div>

                <div module="search_paging" class="ec-base-paginate typeList">
                    <a href="{$param_first}" class="first">첫 페이지</a>
                    <a href="{$param_before}">이전 페이지</a>
                    <ol>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                    </ol>
                    <a href="{$param_next}">다음 페이지</a>
                    <a href="{$param_last}" class="last">마지막 페이지</a>
                </div>
            </div><!-- //product_list -->
        </div><!-- //product_normalpackage -->
    </div>
</div>
