<script>
    
const currentUrl = window.location.href;
if (currentUrl.includes('?cate_no=642')) {
    const targetDiv = document.getElementById('targetDiv');
    const isAuthenticated = sessionStorage.getItem('isAuthenticated');
    
    if (targetDiv) {
        if (isAuthenticated === 'true') {
            targetDiv.classList.add('displaynone');
        } else {
            targetDiv.classList.remove('displaynone');
        }
    }
}

function checkAuth() {
    const inputValue = document.querySelector('#targetDiv .inputBox').value;

    if (inputValue === '2025ARENA') {
        sessionStorage.setItem('isAuthenticated', 'true');
        $('#targetDiv').fadeOut();
    } else {
        alert("인증 코드가 올바르지 않습니다.");
    }
}

document.querySelector('#targetDiv .inputBtn').addEventListener('click', checkAuth);

document.querySelector('#targetDiv .inputBox').addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        checkAuth();
    }
});

</script>
