                <script>
                    function addIcon(){
                    	let listProduct = $(".prdList").children();
                        // console.log('te');

                        for(let i = 0 ; i < listProduct.length ; i++)
                        {
                            let productId = $(listProduct[i]).attr("id");

                            //요약설명에 아이콘
                            //$("#"+productId ).find(".promotion.og_promotion_icons").append($("#"+productId ).find(".forAdd .forAddIcon > span").html()); 
                            // $("#"+productId ).find(".forAdd .forAddIcon > span").html("");
                            
                            //온라인단독 아이콘
                            var spanContent = $("#" + productId).find(".forAdd .forAddIcon > span").html().trim();
                            $("#" + productId).find(".promotion.og_promotion_icons").append(spanContent);
                            var regex = /온라인\s*단독|온라인단독/;
                            if (regex.test(spanContent)) {
                                $("#" + productId).find(".promotion.og_promotion_icons").addClass('online');
                            }
                            
                            //간략설명에 아이콘
                            //$("#"+productId ).find(".promotion.og_promotion_icons").append($("#"+productId ).find(".summary_desc").html());
                            //$("#"+productId ).find(".summary_desc").html("");
                        }
                    }
                    addIcon();
                    $(window).on('scroll', function(){
                    	// addIcon();
                    });
                    // setInterval(addIcon,1000);
                </script>
