<div class="titleArea titleArea--middle og_myshop_apply_head">
  <h3><span><i class="og_apply_type"></i>사유</span><span class="og_required">필수입력사항</span></h3>
</div>
<div class="ec-base-table typeWrite">
  <table border="1" >
    <caption><i class="og_apply_type"></i>사유</caption>
    <colgroup>
      <col style="width:200px;" />
      <col style="width:auto;" />
    </colgroup>
    <tbody>
    <tr>
      <th scope="row">사유선택<span class="og_required"></span></th>
      <td>
        {$form.reason_select}
        <span id="{$cs_shipfee_paid_by_id}" class="{$cs_shipfee_paid_by_display|display}"><i class="og_apply_type"></i>배송비 <span id="{$cs_shipfee_paid_by_who_id}" class="txtEm"></span> 부담</span>
      </td>
    </tr>
    <tr>
      <th scope="row">상세사유<span class="og_required"></span></th>
      <td>{$form.reason_detail|replace:fw-filter,fw-filter placeholder="상세사유를 입력해주세요"}</td>
    </tr>
    </tbody>
  </table>
</div>
