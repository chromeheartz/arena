<div id="{$cs_shipfee_payment_id}" class="{$cs_shipfee_payment_display|display}">
  <div class="titleArea titleArea--middle og_myshop_apply_head">
    <h3><span><i class="og_apply_type"></i>배송비 결제</span><span class="og_required">필수입력사항</span></h3>
  </div>
  <div class="ec-base-table typeWrite">
    <table border="1" >
      <caption><i class="og_apply_type"></i>배송비 결제 정보</caption>
      <colgroup>
        <col style="width:200px;" />
        <col style="width:auto;" />
      </colgroup>
      <tbody>
      <tr>
        <th scope="row"><i class="og_apply_type"></i>배송비</th>
        <td>
          <span id="{$cs_shipfee_paid_by_select_id}"><i class="og_apply_type"></i> 사유를 선택하세요.</span>
          <span id="{$cs_shipfee_paid_by_customer_id}" class="displaynone"><span class="txtEm">구매자 책임사유</span>에 의한 반품이므로 <i class="og_apply_type"></i>배송비 <span class="txtEm">{$price_front_head}<span id="{$cs_shipfee_price_slot_id}">{$shipfee_return}</span>{$price_front_tail}</span>을 구매자가 부담합니다.</span>
          <span id="{$cs_shipfee_paid_by_store_id}" class="displaynone"><span class="txtEm">판매자 책임사유</span>에 의한 반품이므로 <i class="og_apply_type"></i>배송비는 판매자가 부담합니다.</span>
        </td>
      </tr>
      <tr id="{$cs_shipfee_paymethod_id}" class="displaynone">
        <th scope="row"><i class="og_apply_type"></i>배송비 결제방법<span class="og_required"></span></th>
        <td>
          <div class="ec-base-radio typeDelivery">
            {$form.shipfee_paymethod}
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
