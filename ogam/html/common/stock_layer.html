

<!--@css(/ogam/css/common/stock_layer.css)-->
<!--@js(/ogam/js/common/stock_layer.js)-->

<div class="og_layer og_stock_layer">
    <div class="og_stock_layer_inner">
        <div class="header">
            <h2>스마트 픽업 매장 재고 조회하기</h2>
            <a class="og_stock_layer_close btnClose" href="javascript:void(0);">
                <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34" fill="none">
                    <path d="M25.5 8.5L8.5 25.5" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M8.5 8.5L25.5 25.5" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </div>
        <div class="content">
            <div class="product_area">
                <div class="product_data">
                    <div class="thumbnail"><!-- 동적 입력 --></div>
                    <div class="description">
                        <span class="category_name"></span>
                        <h3 class="name"></h3>
                        <span class="product_code"></span>
                        <div class="price_wrap">
                            <ul>
                                <!-- 동적 입력 -->
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="product_option_data">
                    <div class="option_select">
                        <!-- 옵션 동적 생성 -->
                    </div>
                    <div class="now_select_info">
                        <h4>선택 옵션</h4>
                        <div class="box"><strong class="product_name"></strong></div>
                        <!-- 이후로 옵션 동적 붙음 -->
                        <!--strong class="option_0"></strong-->
                    </div>
                </div>
            </div>
            <div class="store_area">
                <div class="find_box">
                    <div class="find_select">
                        <h3>지역 매장 재고 조회</h3><input type="text" placeholder="매장명 또는 지역명을 입력해주세요."><button type="button">검색</button>
                    </div>
<!--                    <div class="check_input"><input id="og_find_store_only_stock" type="checkbox"><label for="og_find_store_only_stock">재고 없는 매장 제외</label></div>-->
                </div>
                <div class="addAlert" style="margin-top: 20px; margin-bottom: -20px;">
                	<p style="color: red; font-weight: 600;">- 재고 현황은 매장 상황에 따라 실 재고 보유와 차이가 있을 수 있습니다.</p>
                    <p style="color: red; font-weight: 600;">- 스마트 픽업 주문 후 매장에 유선으로 확인하신 후 매장 방문 부탁드립니다.</p>
                </div>
                <div class="result_box">
                    <div>
                        <ul class="table_header">
                            <li>지역</li>
                            <li>매장정보</li>
                            <li>재고</li>
                        </ul>
                    </div>
                    <div class="table_tbody">
                        <table>
                            <tbody></tbody>
                            <tbody class="isEmpty">
                            <tr>
                                <td colspan="3">상품 사이즈를 선택해주세요</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="caution_box">
                    <ul>
                        <!-- <li class="point">- 재고 현황은 매장 상황에 따라 실 보유 재고와 차이가 있을수있습니다.</li>-->
                    </ul>
                </div>
            </div>
        </div>
        <div class="footer"></div>
    </div>
</div>
