<div class="og_sub_container" data-page="prdList">
    <div module="product_headcategory" class="section product_top_image prd_og_main_visual">
        <ul class="">
            <li data-header-change-text-trigger-color="black">
                <div class="img_box">{$top_image1_tag}{$top_image1_tag_mobile}</div>
                <div class="og_inner">
                    <div class="title_box">
                        <div class="og_parent_cate_name"><a href="/"></a></div>
                        <div module="Layout_category" data-ogcate-type="currentView_list_select" data-ogcate-event="true">
                            <ul class="menu_1ul">
                                <!-- 자동 호출 메뉴 : 이 부분은 수정하시면 안됩니다. -->
                                <li class="menu_1li" data-cate="{$cate_no}" data-depth="1" data-over-img="{$img_over}" data-img="{$img}">
                                    <a href="/{$design_page_url|replace:list2.html,list.html}{$param}">{$name}</a>
                                </li>
                                <li class="menu_1li" data-cate="{$cate_no}" data-depth="1" data-over-img="{$img_over}" data-img="{$img}">
                                    <a href="/{$design_page_url|replace:list2.html,list.html}{$param}">{$name}</a>
                                </li>
                                <!-- //자동 호출 메뉴 : 이 부분은 수정하시면 안됩니다. -->
                            </ul>
                        </div>
                    </div>
                    <div class="prd_box">
                        <div module="product_listrecommend" class="ec-base-product og_base_product og_prd_swiper_trans" data-ogswipe-module-theme="white">
                            <!--@css(/css/module/product/listrecommend_swipe.css)-->
                            <!--
                                $count = 8
                            -->
                            <ul class="prdList" data-ogswipe-name="bestPrd" data-ogswipe-custom="false" data-ogswipe-module="scrollbar,navigation">
                                <li id="anchorBoxId_{$product_no}" data-prd="{$product_no}" class="each_product">
                                    <!--@import(/ogam/html/prd/common_prd.html)-->
                                    <!--@import(/ogam/html/prd/product_ListItem.html)-->
                                </li>
                                <li id="anchorBoxId_{$product_no}" data-prd="{$product_no}" class="each_product">
                                    <!--@import(/ogam/html/prd/common_prd.html)-->
                                    <!--@import(/ogam/html/prd/product_ListItem.html)-->
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </li>
        </ul>
    </div>


    <div class="section og_new_products">
        <div class="og_inner">
            <div module="product_listnew" class="ec-base-product og_base_product">
                <!--@css(/css/module/product/listnew_swipe.css)-->
                <!--
                    $count = 4
                -->
                <div class="listpage_title" >
                    <div>New Arrival</div>
                    <span>카테고리별 새로운 아이템</span>
                </div><!-- //listpage_title -->
                <ul class="prdList grid4">
                    <li id="anchorBoxId_{$product_no}" data-prd="{$product_no}" class="each_product">
                        <!--@import(/ogam/html/prd/common_prd.html)-->
                        <!--@import(/ogam/html/prd/product_ListItem.html)-->
                    </li>
                    <li id="anchorBoxId_{$product_no}" data-prd="{$product_no}" class="each_product">
                        <!--@import(/ogam/html/prd/common_prd.html)-->
                        <!--@import(/ogam/html/prd/product_ListItem.html)-->
                    </li>
                </ul>
            </div>
        </div><!-- //product_list -->
    </div>

    <div class="normalpackage_box">
        <!-- import(/product/shoppQ/searchContent.html)-->
        <!--@import(/product/shoppQ/searchConditionData.html)-->
        <div module="product_normalpackage" class="">
            <!--@css(/css/module/product/listnormal.css)-->
            <!--@js(/js/module/product/normalmenu.js)-->
            <div module="product_normalmenu" class="og_inner">
                <!--
                    $compare_page = /product/compare.html
                -->
                <div class="og_function_area og_inner">
                    <div class="og_title_box" module="product_headcategory">
                        <h2>{$title_text_or_image}</h2>
                        <!--span class="likeButton {$disp_likecate_class}"><button type="button">{$disp_likecate_icon}<strong>{$disp_likecate_count}</strong></button></span-->
                    </div>
                    <div class="og_function_box">
                        <div class="function" id="{$listmenu_position}">
                            <p class="prdCount">총<strong class="txtEm">{$total_count}</strong>개의 상품이 있습니다.</p>
                            <div class="sort">
                                <select id="selArray" name="selArray" module="product_Orderby">
                                    <option value="{$param}">{$sort_name}</option>
                                    <option value="{$param}">{$sort_name}</option>
                                </select>
                            </div>
                        </div>
                        <div class="og_curation_button">
                            <span>필터</span>
                            <!--@import(/SkinImg/svg/filter.html)-->
                        </div>
                    </div>
                </div>

                <fieldset class="condition {$select_search_display|display}">
                    <legend>조건별 검색</legend>
                    <p>
                        <!--@js(/js/module/product/product_selectsearch.js)-->
                        <select class="FirstSelect" module="product_FirstSelect">
                            <option value>-조건선택-</option>
                            <option value="{$value}" {$selected}>{$title}</option>
                            <option value="{$value}" {$selected}>{$title}</option>
                        </select>
                        <select class="SecondSelect" module="product_SecondSelect">
                            <option value>-조건선택-</option>
                            <option value="{$value}" {$selected}>{$title}</option>
                            <option value="{$value}" {$selected}>{$title}</option>
                        </select>
                        <a href="#SelectSearch" class="btnSubmitFix">검색</a>
                    </p>
                </fieldset>
            </div>
            <!-- 상세검색 팝업형 -->
            <!--@import(/product/shoppQ/searchData_typePopup.html)-->
            <div class="og_inner">
                <div module="product_listnormal" class="ec-base-product og_base_product">
                    <!--
                        $count = 4
                        ※ 상품진열갯수를 설정하는 변수입니다. 설정하지 않을 경우, 최대 200개의 상품이 진열 됩니다.
                        ※ 진열된 상품이 많으면, 쇼핑몰에 부하가 발생할 수 있습니다.
                        $moreview = yes
                        $cache = yes
                        $basket_result = /product/add_basket.html
                        $basket_option = /product/basket_option.html
                    -->
                    <ul class="prdList grid4">
                        <li id="anchorBoxId_{$product_no}" data-prd="{$product_no}" class="each_product">
                            <!--@import(/ogam/html/prd/common_prd.html)-->
                            <!--@import(/ogam/html/prd/product_ListItem.html)-->
                        </li>
                        <li id="anchorBoxId_{$product_no}" data-prd="{$product_no}" class="each_product">
                            <!--@import(/ogam/html/prd/common_prd.html)-->
                            <!--@import(/ogam/html/prd/product_ListItem.html)-->
                        </li>
                    </ul>
                </div>

                <div module="product_listmore" class="more layout_hidden">
                    <a href="#none" onclick="{$more_action}" class="btnMore">
                        상품 더보기<div>(<span id="more_current_page">{$current_page}</span>/<span id="more_total_page">{$total_page}</span>)</div>
                    </a>
                </div>

                <div module="product_normalpaging" class="ec-base-paginate typeList">
                    <a href="{$param_first}" class="first">첫 페이지</a>
                    <a href="{$param_before}">이전 페이지</a>
                    <ol>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                        <li><a href="{$param}" class="{$param_class}">{$no}</a></li>
                    </ol>
                    <a href="{$param_next}">다음 페이지</a>
                    <a href="{$param_last}" class="last">마지막 페이지</a>
                </div>
            </div><!-- //product_list -->
        </div><!-- //product_normalpackage -->
    </div>
</div>
