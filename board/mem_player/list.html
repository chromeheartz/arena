<div class="memRegi">
    <div class="section titleArea">
        <h2>아레나 선수 등록</h2>
    </div>
    <picture>
        <img src="/SkinImg/banner/Regi_banner.png">
    </picture>
    <div class="wid_content">
        <div class="txt_wrap">
            <h3>아레나 등록선수 혜택</h3>
            <p>아레나에 등록선수 인증을 하시면 수영선수만의 특별한 혜택을 누리실 수 있습니다</p>
        </div>
        <div class="benefit_list">
            <ul>
                <li>당해 등록선수만 할인 혜택 제공</li>
                <li>선수 혜택은 등록일로부터 12월 31일까지 유효(이후 소멸)</li>
                <li>신청 완료 시 등록선수 확인중 검토 후 인증 승인</li>
                <li>혜택에 대한 자세한 내용은 승인 완료 후 마이페이지에서 확인 가능</li>
            </ul>
        </div>

        <div class="txt_wrap">
            <h3>정보입력 · 신청하기</h3>
        </div>
        <div class="Requirements">
            <div class="section board-section" module="board_writePackage_2">
                <!--@css(/css/module/board/writePackage_9.css)-->
                <!--@css(/css/module/board/boardPackage.css)-->

                <div module="board_write_2">
                    <!--
                        $login_page_url = /member/login.html
                        $deny_access_url = /index.html
                    -->

                    <div class="member_name">
                        <span>이름</span>
                        <span></span>
                    </div>

                    <div class="member_id">
                        <span>아이디</span>
                        <span></span>
                    </div>

                    <div class="member_phone">
                        <span>휴대폰</span>
                        <span></span>
                    </div>


                    <div>
                        <span>등록선수 확인증 </span>
                        <span>{$form.attach_file}</span>
                    </div>
                    <div>
                        <span>가족관계증명서</span>
                        <span>{$form.attach_file}</span>
                    </div>

                    <div class="btn_regi btn_blue">
                        <!--<span class="{$config.is_admin|display}"><a href="#none" class="btnNormalFix sizeM" onclick="{$action_comment_admin}">관리자 답변보기</a></span>-->
                        <a href="#none" onclick="{$action_write}">신청하기</a>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>
