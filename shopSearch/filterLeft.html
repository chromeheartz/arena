}

}

.dalue_left_filter_container {

	height: 100%;

}

.dalue_left_filter_button {
	position: absolute;
    /* top: 195px; */
    top: 350px;
    right: 9px;

    outline: 0;
    /* color: #e5e5e5; */

    font-size: 12px;
    /* background: linear-gradient(90deg,#1a314c 0,#275f94 100%); */
    /* background: linear-gradient(90deg,#f67280 0,#f88195 100%); */

    border-bottom-right-radius: 30px;
    line-height: 1.4;
    height: 140px;
    z-index: -1;
}

.dalue_left_filter_button :before {
    position: absolute;
    top: -10px;
    left: 0;
    display: block;
    content: "";
    width: 27px;
    height: 10px;
    background: url(1669687064) no-repeat 0 0;
}

.dalue_left_filter_button :after {
    position: absolute;
    top: 100%;
    left: 0;
    display: block;
    content: "";
    width: 27px;
    height: 10px;
    background: url(1669687064) no-repeat 0 0;
}


.dalue_left_filter_row {
	border-bottom: 1px solid #f0f0f0;
}

.dalue_left_filter_content {
	display: block;
	margin: 0 0 13px;
	padding: 0;
}

.dalue_left_filter_content > ul {
	margin: -6px 0 0 -5px;
    font-size: 0;
    line-height: 0;
    padding: 0;
}

.dalue_left_filter_content > ul > li {
	display: inline-block;
    padding: 6px 0 0 5px;
    min-width: 30%;
    max-width: 100%;
    vertical-align: top;
    -webkit-box-sizing: border-box;
    list-style: none;
}

.dalue_left_filter_content > ul > li > button {
	display: inline-block;
    width: 100%;
    border-radius: 15px;
    border: 1px solid #ccc;
    padding: 6px;
    outline: 0;
    font-size: 12px;
    line-height: 18px;
    color: #000;
    word-break: break-all;
    word-wrap: break-word;
    background: #fff;
}

.dalue_left_filter_content > ul > li > button.disabled {
	border-color: #d7d7d8;
    color: #d7d7d8;
    cursor: default;
}

.dalue_left_filter_content > ul > li > button.active {
	border: 2px solid #508bed;
    padding: 5px;
    color: #508bed;
}

.dalue_left_filter_title {
	position: relative;
    padding: 10px 19px 10px 5px;
    text-transform: uppercase;
    font-size: 12px;
    cursor: pointer;
    margin: 0;

.dalue_left_filter_title_header {

.dalue_left_filter_sticky_bottom {

function sortWithWeight1ASC(a, b) {

    } else if(sortWeight1[a] != undefined) {
        return -1;
    }

function typoCorrection(json) {
    if(json.result.length > 0 && json.result[0].word.replace(/ /g,'').length > 0 && json.result[0].word.replace(/ /g,'') != DalueSearch.searchOptions.query.replace(/ /g,'')) {
        var lc = json.result[0].word.charAt(json.result[0].word.length - 1).charCodeAt(0);
        var js = parseInt(((lc - 44032) % (21 * 28)) % 28)
        console.log(js + ' : ' + lc);
        
        $('.typoCorrectionTxt').html('<a href="?query=' + json.result[0].word + '" style="text-decoration: underline;">\'' + json.result[0].word + '\'' + (js != 0 ? '으' : '') + '로 검색하셨나요?</a>');
        $('.typoCorrectionWrap').css('display', '');
    } else {

                    itemOut = itemHtmlColorName;
                } else if($('.dalue_filter-' + filters[i]).hasClass('button-type')) {
                    itemOut = itemHtmlType;

				itemOut = itemOut.replaceWhole('{$tag}', DalueSearch.escapeHtml(keys[j]));
				itemOut = itemOut.replaceWhole('{$name}', DalueSearch.escapeHtml(keys[j]));
                itemOut = itemOut.replaceWhole('{$name-s}', DalueSearch.escapeHtml(keys[j]).toLowerCase());
				itemOut = itemOut.replaceWhole('{$click}', 'dalue_filter_tagClick(this);');
				if(json.tagStat.tag[filters[i]][keys[j]] == 0) {
					itemOut = itemOut.replaceWhole('{$class}', 'disabled');

                    nsels++;
					if(dalue_filter_selected[filters[i] + '^' + keys[j]] == undefined) {

					} else {
						itemOut = itemOut.replaceWhole('{$class}', 'dalue_filter_select_button active');

            }
			$('.dalue_filter-' + filters[i]).html(html);	
            // console.log(html);
		}
		
	}
    
    $('#dss-empty').css('display', 'none');
    // alert('aaa');
    $('#dalue_search_filter').css('display', '');

function dalue_filter_search() {
    DalueSearch.searchOptions.begin = 1;
    
    if(window.location.href.indexOf('shopSearch/search.html') > -1) {
        // DalueSearch.searchAddOrDeleteTag(null, null);
        dalue_filter_show();
    } else {
        try {
        	var params = DalueSearch.parseParameter();
        	DalueSearch.searchWithTag(params['query'] == undefined ? '*' : params['query']);
        } catch(e) {
            console.error(e);
        }
        
    }
}
    
function dalue_filter_reset() {
    if(window.location.href.indexOf('shopSearch/search.html') > -1) {
    	DalueSearch.removeTagUrl();
    }
    
    for(var i = 0; i < $('.dalue_filter_select_button').length; i++) {
        var elm = $('.dalue_filter_select_button').eq(i);
        DalueSearch.deleteTag(elm.attr('field'), elm.attr('tag'));
        elm.removeClass('active');
        delete dalue_filter_selected[elm.attr('field') + '^' + elm.attr('tag')];
        //DalueSearch.searchOptions.tagValues[elm.attr('field')] = '';
    }
    
    console.log(window.location.href);
    
    if(window.location.href.indexOf('shopSearch/search.html') > -1) {
        //window.location.reload();
        // DalueSearch.searchOptions.query = '';
        DalueSearch.removeQuery();
        DalueSearch.options.tagStatOnly = 0;
        DalueSearch.searchWithOptions();
    } else {
        DalueSearch.options.tagStatOnly = 1;
        DalueSearch.searchWithOptions();
    }
}

	if(elm.hasClass('active')) {
		elm.removeClass('active');
		delete dalue_filter_selected[elm.attr('field') + '^' + elm.attr('tag')];
        DalueSearch.deleteTag(elm.attr('field'), elm.attr('tag'));
	} else {
		elm.addClass('active');
		dalue_filter_selected[elm.attr('field') + '^' + elm.attr('tag')] = 'Y';
        DalueSearch.addTag(elm.attr('field'), elm.attr('tag'));
	}
    
    if(window.location.href.indexOf('shopSearch/search.html') > -1) {
        DalueSearch.options.tagStatOnly = 0;
        DalueSearch.searchWithOptions();
    } else {
        DalueSearch.options.tagStatOnly = 1;
        DalueSearch.searchWithOptions();
        // DalueSearch.searchWithTagAddOnly(elm.attr('field'), elm.attr('tag'));
    }
    
}
    

</script>
