function parse_query_string(query) {
  var vars = query.split("&");
  var query_string = {};
  for (var i = 0; i < vars.length; i++) {
    var pair = vars[i].split("=");
    var key = decodeURIComponent(pair[0]);
    var value = decodeURIComponent(pair[1]);
    if (typeof query_string[key] === "undefined") {
        try {
            query_string[key] = decodeURIComponent(value);
        } catch(e) {
            query_string[key] = (value);
        }
      // If second entry with this name
    } else if (typeof query_string[key] === "string") {
        try {
            var arr = [query_string[key], decodeURIComponent(value)];
            query_string[key] = arr;
        } catch(e) {
            var arr = [query_string[key], (value)];
            query_string[key] = arr;
        }
      // If third or later entry with this name
    } else {
      query_string[key].push(decodeURIComponent(value));
    }
  }

  return query_string;
}

function recentKeyword(fullLoad) {
    if(true) {
        return;
    }
    
    var hist = DalueSearch.getJsonCookie(DalueSearch.Consts.COOKIE_QUERY_HISTORY);
    var html = '';
    
    if(fullLoad == true) {
        if(DalueSearch.parseParameter()['query'] != undefined && DalueSearch.parseParameter()['query'] != '' && DalueSearch.parseParameter()['query'] != '*') {
            var cq = decodeURIComponent(DalueSearch.parseParameter()['query']).replace(/\+/g, ' ');
            if(hist == undefined || hist.queries == undefined) {
                hist = { queries: [] };
            }

            var fltArr = hist.queries.filter(function(e) { return e.query !== cq });
            hist.queries = fltArr;
            hist.queries.unshift( { query: cq } );
        }
    }
    
    
    if(hist == undefined || hist.queries == undefined) { // no recentKeyword
        html = '<center>최근 검색어가 없습니다.</center>';
    } else {    
        for(var i = 0; i < hist.queries.length; i++) {
            html += '<li><span><a href="/shopSearch/search.html?query=' + encodeURI(hist.queries[i].query) + '" class="">' + DalueSearch.escapeHtml(hist.queries[i].query) + '</a></span>';
            html += '<span><a href="javascript:;" onclick="DalueSearch.removeJsonCookie(\'' + hist.queries[i].query + '\'); recentKeyword();" class="w-keyword-del-btn"></a></span></li>';
        }
    }
    
    $('#recentKeyword1').html(html);
	$('#recentKeyword2').html(html);
}

function dalueSearchSort(elmId, type) {
	var sortButtons = [ $('#sortLabel1'), $('#sortLabel2'), $('#sortLabel3'), $('#sortLabel4'), $('#sortLabel5') ];
	for(var i = 0; i < sortButtons.length; i++) {
		sortButtons[i].removeClass('dalue_bold');
	}
    
	$('#' + elmId).addClass('dalue_bold');
    
    $('#' + elmId).addClass('dalue_bold');
    if(elmId == 'sortLabel4') {
        DalueSearch.options.freqUpdateFieldSort = 'reviews';
    } else {
        DalueSearch.options.freqUpdateFieldSort = '';
    }
    
    DalueSearch.searchOptions.replaceHistory = false;
	DalueSearch.searchParameterSort(type);
    
    
}

function setDalueSearchSortInit() {
    var sortButtons = [ $('#sortLabel1'), $('#sortLabel2'), $('#sortLabel3'), $('#sortLabel4'), $('#sortLabel5') ];
    
    for(var i = 0; i < sortButtons.length; i++) {
		sortButtons[i].removeClass('dalue_bold');
	}
    
    if(DalueSearch.options.freqUpdateFieldSort != null && DalueSearch.options.freqUpdateFieldSort == 'reviews') {
        $('#sortLabel4').addClass('dalue_bold');
    } else {
        for(var i = 0; i < sortButtons.length; i++) {
            if(sortButtons[i].attr('val') == DalueSearch.searchOptions.sortType) {
                sortButtons[i].addClass('dalue_bold');
            }
        }
    }
}

}
    
function getJsonCookie(name) {
    var x, y;
    var val = document.cookie.split(';');
    var parsed;

    for (var i = 0; i < val.length; i++) {
        x = val[i].substr(0, val[i].indexOf('='));
        y = val[i].substr(val[i].indexOf('=') + 1);
        x = x.replace(/^\s+|\s+$/g, '');

        if (x == name) {
            try {
                if(y != undefined) {
                    //console.error(y);
                    parsed = JSON.parse(decodeURI(y));
                    return parsed
                }

            } catch(e) {
                
            }
        }
    }

    return null;
}
