        <script>

            $('.dalue_css_filter_row').each(function () {
                const $row = $(this);
                const $content = $row.find('.dalue_css_column_content');

                // 타이틀 텍스트 결정
                let title = '필터';
                
                // let filters = DalueSearch.options.tagFields.split('|');
                var titles = {};
                titles['delivery'] = '배송';
                titles['colorName'] = '컬러';
                titles['backStyle'] = '백스타일';
                titles['sizeShoe'] = '신발 사이즈';
                titles['sizeSuit'] = '사이즈';
                titles['price'] = '가격';
                titles['type'] = '종류';
                titles['class'] = '카테고리'; 
                
                let keys = Object.keys(titles);
                for(let nf = 0; nf < keys.length; nf++) {
                    if($content.hasClass('dalue_filter-' + keys[nf])) {
                       title = titles[keys[nf]];
                       break;
                    }
                }
                
                if ($content.hasClass('dalue_css_column_content_category')) {
                    title = '카테고리';
                } else if ($content.hasClass('dalue_css_column_content_price')) {
                    title = '가격';
                }

                // 이미 h6 있으면 중복 생성 방지
                if ($row.find('.dalue_filter_title').length === 0) {
                    const $title = $('<h6 class="dalue_filter_title"></h6>').text(title);
                    $row.prepend($title);
                }

                const $title = $row.find('.dalue_filter_title');

                // 초기 닫힘
                $content.hide();
                $row.removeClass('on');
                $title.removeClass('on');

                // 클릭 이벤트
                $title.off('click.dalueAccordion').on('click.dalueAccordion', function () {
                    const isOpen = $row.hasClass('on');

                    // 다른 아코디언 닫기 (원하면 제거)
                    $('.dalue_css_filter_row').removeClass('on');
                    $('.dalue_filter_title').removeClass('on');
                    $('.dalue_css_column_content').slideUp(200);

                    if (!isOpen) {
                        $row.addClass('on');
                        $title.addClass('on');
                        $content.slideDown(200);
                    }
                });
            });


            $(document).ready(function () {
                var $recommendLinks = $('.xans-search-hotkeyword a');

                var $keywordWrap = $('#dalue_search_noResult .keyword-wrap');

                // 기존 내용 비우기
                $keywordWrap.empty();

                // 추천 검색어 a 태그 하나씩 복사해서 추가
                $recommendLinks.each(function () {
                    var $clone = $(this).clone();
                    $keywordWrap.append($clone);
                });
            });

        </script>
