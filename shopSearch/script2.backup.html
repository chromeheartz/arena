<script>
var __query = '';

function parse_query_string(query) {
  var vars = query.split("&");
  var query_string = {};
  for (var i = 0; i < vars.length; i++) {
    var pair = vars[i].split("=");
    var key = decodeURIComponent(pair[0]);
    var value = decodeURIComponent(pair[1]);
    if (typeof query_string[key] === "undefined") {
        try {
            query_string[key] = decodeURIComponent(value);
        } catch(e) {
            query_string[key] = (value);
        }
      // If second entry with this name
    } else if (typeof query_string[key] === "string") {
        try {
            var arr = [query_string[key], decodeURIComponent(value)];
            query_string[key] = arr;
        } catch(e) {
            var arr = [query_string[key], (value)];
            query_string[key] = arr;
        }
      // If third or later entry with this name
    } else {
      query_string[key].push(decodeURIComponent(value));
    }
  }

  return query_string;
}

function dalue_hotKeyword_onSuccess(json) {
    var k = '';

    //console.error(JSON.stringify(json));

    for(var i = 0; i < 10; i++) {
        $('#hotkeyword_' + (i+1)).css('display', 'none');
    }

    var nk = 0;
    var html1 = '';
    var html2 = '';
    for(var i = 0; i < json.result.length; i++) {
        if(json.result[i] == '*') {
            continue;
        }
        k = json.result[i].indexOf('(') > -1 ? json.result[i].substring(json.result[i].indexOf('(') + 1, json.result[i].indexOf(')')) : json.result[i];
        k = DalueSearch.escapeHtml(k);
        // console.log(k);
        $('#hotkeyword_' + (nk+1)).text(k);
        $('#hotkeyword_' + (nk+1)).css('display', '');
        $('#hotkeyword_' + (nk+1)).css('cursor', 'pointer');
        $('#hotkeyword_' + (nk+1)).attr('query', k);
        $('#hotkeyword_' + (nk+1)).bind('click', function() {
            window.location.href = '/shopSearch/search.html?query=' + $(this).attr('query');
        });

        if(nk < 10) {
            html1 += '<li id="dalue_li_hk_' + (nk+1) + '" class="" style="height: 26px;"><a id="dalue_ac_keyword_' + (nk+1) +'" href="/shopSearch/search.html?query=' + k + '">' + (nk+1) + '. ' + k + '</a></li>';
        } else if(nk < 20) {
            html2 += '<li id="dalue_li_hk_' + (nk+1) + '" class="" style="height: 26px;"><a id="dalue_ac_keyword_' + (nk+1) +'" href="/shopSearch/search.html?query=' + k + '">' + (nk+1) + '. ' + k + '</a></li>';
        }

        nk++;
    }

    $('#dalue_hk_1').html(html1);
    $('#dalue_hk_2').html(html2);

}

    if(DalueSearch.options.freqUpdateFieldSort != null && DalueSearch.options.freqUpdateFieldSort == 'reviews') {
        $('#sortLabel4').addClass('dalue_bold');
    } else {
        for(var i = 0; i < sortButtons.length; i++) {
            if(sortButtons[i].attr('val') == DalueSearch.searchOptions.sortType) {
                sortButtons[i].addClass('dalue_bold');
            }
        }
    }
}

function containsEncodedComponents(x) {
  // ie ?,=,&,/ etc
  return (decodeURI(x) !== decodeURIComponent(x));
}

function searchButtonClick(elm) {
    if($('#dalue_search_keywordPromotion_0').css('display') == 'none') { DalueSearch.goSearch(); } else { if(DalueSearch.keywordPromotionList[DalueSearch.keywordPromotionElementNo] != undefined) { event.preventDefault(); window.location.href = DalueSearch.keywordPromotionList[DalueSearch.keywordPromotionElementNo].url; } else { DalueSearch.goSearch(); } }
}

function getJsonCookie(name) {
    var x, y;
    var val = document.cookie.split(';');
    var parsed;

    for (var i = 0; i < val.length; i++) {
        x = val[i].substr(0, val[i].indexOf('='));
        y = val[i].substr(val[i].indexOf('=') + 1);
        x = x.replace(/^\s+|\s+$/g, '');

        if (x == name) {
            try {
                if(y != undefined) {
                    //console.error(y);
                    parsed = JSON.parse(decodeURI(y));
                    return parsed
                }

            } catch(e) {

            }
        }
    }

    return null;
}
