
<!--
1. 일단 project-image-wrapper 를 전체 복사 붙여넣기 해주세요
2. project-image-wrapper 옆에 해당 기획전 number를 넣어주시면 됩니다.
3. img들을 파일업로더에 product-project 폴더에 올려놓으시고 해당 주소들을 img src에 넣어주시면 됩니다.

5. ###### 여기서 중요한것은 usemap이라는 속성이 map찍혀있는 name, id에 맞게 같이 들어가야 합니다.
-->

<!-- 여기는 안건드리셔도 됩니다 -->
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const params = new URLSearchParams(window.location.search);
        const cateNo = params.get("cate_no");

        const projectWrappers = document.querySelectorAll(".project-image-wrapper");
        const bannerManagers = document.querySelectorAll(".og_project_imgs.df-bannermanager");

        projectWrappers.forEach(el => el.style.display = "none");

        if (!cateNo) {
            bannerManagers.forEach(el => el.style.display = "none");
            return;
        }

        let matched = false;

        projectWrappers.forEach(wrapper => {
            if (wrapper.classList.contains(cateNo)) {
                wrapper.style.display = "block";
                matched = true;
            }
        });

        if (matched) {
            bannerManagers.forEach(el => el.style.display = "none");
        }
    });
</script>
