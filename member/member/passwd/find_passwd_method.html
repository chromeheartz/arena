<!--@js(/ogam/js/member.js)-->


<div class="section path">
    <span>현재 위치</span>
    <ol>
        <li><a href="/">홈</a></li>
        <li title="현재 위치"><strong>비밀번호 찾기</strong></li>
    </ol>
</div>

<div class="og_member_inner" id="og_member_find_pw_method">

    <div class="section titleArea og_member_title mgB48">
        <h2>비밀번호 찾기</h2>
    </div>
    <div module="member_findpasswdmethod" class="memberArea">
        <!--@css(/css/module/member/find_passwd_method.css)-->
        <!--
            $nextURL = /member/passwd/find_passwd_result.html
         -->
        <div class="ec-base-box typeMember">
            <fieldset class="content">
                <legend>임시 비밀번호 전송</legend>
                <ul class="ec-base-desc gVer">
                    <li><strong class="term">임시 비밀번호</strong><span class="desc">{$form.passwd_method_type}</span></li>
                    <li id="{$passwd_method_email_info}"><strong class="term">이메일</strong><span class="desc mgB0"><input value="{$passwd_method_email}" type="text"readonly></span></li>
                    <li id="{$passwd_method_mobile_info}"><strong class="term">휴대폰 번호</strong><span class="desc mgB0"><input value="{$passwd_method_mobile}" type="text" readonly></span></li>
                </ul>
            </fieldset>
        </div>
        <div class="ec-base-button og_find_sesult_button">
            <a href="#none" class="btnSubmit sizeM" onclick="{$action_func_find_passwd_send}">임시 비밀번호 전송</a>
            <a href="#none" class="btnNormal sizeM" onclick="{$action_func_find_passwd_cancel}">취소</a>
        </div>
    </div>
</div>
