<!--@layout(/layout/basic/layout.html)-->

<!--@css(/ogam/css/member.css)-->
<!--@js(/ogam/js/member.js)-->


<div class="section path">
    <span>현재 위치</span>
    <ol>
        <li><a href="/">홈</a></li>
        <li title="현재 위치"><strong>비밀번호 찾기</strong></li>
    </ol>
</div>

<div class="og_member_inner" id="og_member_find_pw_reset">

    <div class="section titleArea og_member_title">
        <h2>비밀번호 찾기</h2>
    </div>
    <div module="member_passwordreset" class="memberArea og_member_inner">
        <!--@css(/css/module/member/passwd_reset.css)-->
        <div class="ec-base-box typeMember">
            <fieldset class="content">
                <legend>비밀번호 재설정</legend>
                <ul class="ec-base-desc gVer">
                    <li><strong class="term">아이디</strong>
                        <div class="desc"><input value="{$member_id}" type="text" readonly></div>
                    </li>
                    <li>
                        <strong class="term">새 비밀번호</strong>
                        <div class="desc">
                            {$form.new_passwd|replace:value,value placeholder="비밀번호를 입력해주세요"}
                            <div class="txtInfo">
                                {$passwd_type_desc}
                            </div>
                        </div>
                    </li>
                    <li class=""><strong class="term">새 비밀번호 확인</strong><div class="desc mgB0">{$form.new_passwd_confirm|replace:value,value placeholder="비밀번호를 입력해주세요"}</div></li>
                </ul>
            </fieldset>
        </div>
        <div class="ec-base-button og_find_sesult_button">
            <a href="#none" class="btnSubmit sizeM" onclick="{$action_func_password_reset_submit}">비밀번호 변경</a>
            <a href="#none" class="btnNormal sizeM" onclick="{$action_func_password_reset_cancel}">취소</a>
        </div>
    </div>
</div>
