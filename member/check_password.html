<!--@css(/ogam/css/member.css)-->
<!--@js(/ogam/js/member.js)-->


<div class="section path">
    <span>현재 위치</span>
    <ol>
        <li><a href="/">홈</a></li>
        <li title="현재 위치"><strong>회원정보수정</strong></li>
    </ol>
</div>

<div class="og_member_inner" id="og_member_check_pw" module="member_checkpassword" >

    <div class="section titleArea og_member_title">
        <h2>회원정보수정</h2>
    </div>
    <div class="ec-base-help">
        <ul>
            <li><strong>{$member_id}</strong> 님의 회원정보를 안전하게 보호하기 위해<br />비밀번호를 한번 더 확인해 주세요.</li>
        </ul>
    </div>
    <div class="memberArea">
        <!--@css(/css/module/member/checkpassword.css)-->
        <div class="ec-base-box typeMember">
            {$enc_password}
            <div class="content">
                <fieldset>
                    <legend>비밀번호 확인</legend>
                    <ul class="ec-base-desc gVer">
                        <li><strong class="term">비밀번호 확인</strong><div class="desc mgB0">{$form.cp_password|replace:type="password",type="password" placeholder="비밀번호를 입력해주세요"}</div></li>
                    </ul>
                </fieldset>

            </div>
        </div>
        <div class="ec-base-button og_find_sesult_button">
            <a href="#none" class="btnSubmitFix sizeM" onclick="{$check_password_action}">확인</a>
        </div>
    </div>
</div>
